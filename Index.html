<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream Player (Video.js)</title>
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
  <style>
    body {
      background: #e9eef3;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 0 12px;
    }
    .container {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.13);
      padding: 24px;
      max-width: 480px;
      width: 100%;
      margin: 45px auto;
    }
    .header {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 21px;
      color: #0d6efd;
    }
    .video-js {
      border-radius: 12px;
      box-shadow: 0 0 0 3px #0d6efd;
      width: 100% !important;
      height: 234px !important;
      background: #000;
    }
    .quality-row {
      margin-bottom: 12px;
      text-align: right;
    }
    .share-btn {
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.25s;
    }
    .share-btn:hover {
      background: #0a58ca;
    }
    label[for="qualitySelect"] {
      font-weight: 500;
      color: #0d6efd;
      margin-right: 4px;
      font-size: 15px;
    }
    select#qualitySelect {
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 15px;
      padding: 4px 8px;
      background: #f1f6fc;
      color: #0d6efd;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Live Stream</div>
    <div class="quality-row">
      <label for="qualitySelect">Quality:</label>
      <select id="qualitySelect" disabled>
        <option>Loading...</option>
      </select>
    </div>
    <video
      id="liveVideo"
      class="video-js vjs-default-skin"
      controls
      autoplay
      playsinline
    ></video>
    <button class="share-btn" id="shareBtn">Share This Page Link</button>
  </div>

  <!-- Video.js 8 -->
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <script>
    const streamUrl = "https://psl.bigbaat.app/out/v1/0ef369b90c7b4025b76621e46ee5fb70/index.m3u8";
    const videoEl = document.getElementById('liveVideo');
    const qualitySelect = document.getElementById('qualitySelect');

    // Initialize Video.js player
    const player = videojs('liveVideo', {
      preload: 'auto',
      liveui: true,
      fluid: true
    });

    // QUALITY CONTROL LOGIC
    function setupWithHlsJs() {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(player.tech().el());

        hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
          // Build quality selector
          qualitySelect.innerHTML = "";
          // Auto option
          const autoOption = document.createElement('option');
          autoOption.value = '-1';
          autoOption.text = 'Auto';
          qualitySelect.appendChild(autoOption);

          data.levels.forEach(function(level, idx) {
            const option = document.createElement('option');
            option.value = idx;
            option.text = `${level.height}p (${Math.round(level.bitrate/1000)} kbps)`;
            qualitySelect.appendChild(option);
          });
          qualitySelect.disabled = false;
          qualitySelect.value = '-1';
        });

        qualitySelect.addEventListener('change', function() {
          hls.currentLevel = parseInt(this.value, 10);
        });

      } else {
        // No HLS.js support: fallback to native video
        player.src({ src: streamUrl, type: 'application/vnd.apple.mpegurl' });
        qualitySelect.innerHTML = "<option>Quality selection not available in this browser</option>";
        qualitySelect.disabled = true;
      }
    }

    // Detect native HLS support
    function hasNativeHls() {
      const v = document.createElement('video');
      return v.canPlayType('application/vnd.apple.mpegurl');
    }

    if (hasNativeHls() && !Hls.isSupported()) {
      // Safari and iOS browsers
      player.src({ src: streamUrl, type: 'application/vnd.apple.mpegurl' });
      qualitySelect.innerHTML = "<option>Quality selection not available in Safari/iOS</option>";
      qualitySelect.disabled = true;
    } else {
      // Others – use HLS.js
      setupWithHlsJs();
    }

    // Share button logic
    document.getElementById('shareBtn').onclick = function() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        alert('Link Copied');
      });
    };
  </script>
</body>
</html>
